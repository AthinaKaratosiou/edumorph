<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | EduMorph</title>

  <link rel="stylesheet" href="global-accessibility.css">
  <script src="global.js" defer></script>

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #2563eb;
      --teal: #0ea5a4;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      background: linear-gradient(135deg, #1e3a8a, #0f766e);
      color: white;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .topbar button,
    .topbar a {
      background: #0ea5a4;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .topbar button:hover,
    .topbar a:hover {
      background: #0f766e;
    }

    .container {
      max-width: 1150px;
      margin: 0 auto;
      padding: 28px 20px 50px;
    }

    .welcome-card,
    .section-card {
      background: var(--card);
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .role-badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1e3a8a;
      font-weight: bold;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .feature-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.10);
    }

    .feature-card h3 {
      margin-top: 0;
      color: var(--accent);
    }

    .feature-card a {
      display: inline-block;
      margin-top: 10px;
      color: white;
      background: var(--teal);
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .feature-card a:hover {
      background: #0f766e;
    }

    .quick-info {
      margin-top: 14px;
      color: #4b5563;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 16px;
      }

      .topbar h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
<main id="main-content">

  <div class="topbar">
    <h1 data-i18n="dashboardTitle">EduMorph Dashboard</h1>
    <div>
      <a href="index.html" data-i18n="homeBtn">Αρχική</a>
      <button onclick="logout()" data-i18n="logoutBtn">Αποσύνδεση</button>
    </div>
  </div>

  <div class="container">
    <section class="welcome-card">
      <h2 id="welcomeTitle">Καλώς ήρθες!</h2>
      <p id="welcomeText">Φόρτωση στοιχείων χρήστη...</p>
      <div id="roleBadge" class="role-badge"></div>
      <div class="quick-info" id="quickInfo"></div>
    </section>

    <section class="section-card">
      <h2 data-i18n="roleFeaturesTitle">Λειτουργίες ανά ρόλο</h2>
      <div id="roleFeatures" class="grid"></div>
    </section>
  </div>

</main>

      teacherQuickInfo: 'Το dashboard σου δίνει έμφαση στα analytics, στην παιδαγωγική παρέμβαση, στην παρακολούθηση κατανόησης και άγχους, και στα αποτελέσματα αξιολόγησης των μαθητών.',

      adminDescription: 'Ως διοίκηση έχεις συνολική εποπτεία, μπορείς να παρακολουθείς δεδομένα, να υποστηρίζεις την καινοτομία και να αξιοποιείς αναφορές.',
      adminQuickInfo: 'Το περιβάλλον της διοίκησης εστιάζει στη συνολική εικόνα, στις αναλύσεις, στα reports, στην απόδοση των παρεμβάσεων και στην αξιοποίηση της πλατφόρμας σε επίπεδο οργανισμού.',

      teacherCard1Btn: 'Άνοιγμα',

      teacherCard2Title: 'Μηχανισμός Παρεμβάσεων',
      teacherCard2Text: 'Ενεργοποίησε παιδαγωγικά playbooks σύμφωνα με τα δεδομένα της τάξης.',
      teacherCard2Btn: 'Ενεργοποίηση',

      teacherCard3Title: 'Impact Analytics',
      teacherCard3Text: 'Αξιολόγησε τον αντίκτυπο των παρεμβάσεων μέσα από before/after εικόνα.',
      teacherCard3Btn: 'Προβολή',

      teacherCard4Text: 'Παρακολούθησε αποτελέσματα quiz και real-time reporting για τους μαθητές.',
      teacherCard4Btn: 'Προβολή',

      teacherCard5Title: 'Gamification Overview',
      teacherCard5Text: 'Δες πώς η παιχνιδοποίηση ενισχύει τη συμμετοχή και την πρόοδο.',
      teacherCard5Btn: 'Προβολή',

      adminCard1Title: 'Συνολικό Προφίλ Τάξης',
      adminCard1Text: 'Δες τη συνολική εικόνα της σχολικής μονάδας ή του ιδρύματος.',

      adminCard2Text: 'Παρακολούθησε την αποτελεσματικότητα των παρεμβάσεων και των αλλαγών.',

      adminCard3Btn: 'Άνοιγμα',

      adminCard4Title: 'Assessment Overview',

      adminCard4Btn: 'Προβολή',

      adminCard5Text: 'Δες το όραμα, την αποστολή και το μοντέλο λειτουργίας της πλατφόρμας.',
      adminCard5Btn: 'Προβολή'
    },
    en: {
      dashboardTitle: 'EduMorph Dashboard',
      homeBtn: 'Home',
      logoutBtn: 'Logout',
      roleFeaturesTitle: 'Role-based features',
      welcomePrefix: 'Welcome,',
      fallbackUser: 'User',
      roleStudent: 'Role: Student',
      roleTeacher: 'Role: Teacher',
      roleAdmin: 'Role: Administration',
      roleUser: 'Role: User',

      studentDescription: 'As a student, you can record experiences, suggest improvements, and actively participate in improving the classroom.',
      studentQuickInfo: 'Your personal environment emphasizes participation, feedback, self-assessment, and stronger engagement through gamification.',

      teacherDescription: 'As an educator, you can monitor classroom indicators, activate interventions, and evaluate their effectiveness.',
      teacherQuickInfo: 'Your dashboard emphasizes analytics, pedagogical intervention, monitoring understanding and anxiety, and reviewing student assessment results.',

      adminDescription: 'As administration, you have overall supervision, can monitor data, support innovation, and use reports.',
      adminQuickInfo: 'The administration environment focuses on the overall picture, analytics, reports, intervention performance, and platform usage at organization level.',

      studentCard2Btn: 'View',

      studentCard4Btn: 'Open',

      teacherCard1Title: 'Collective Classroom Profile',

      teacherCard1Btn: 'Open',

      teacherCard2Title: 'Intervention Engine',

      teacherCard2Btn: 'Activate',

      teacherCard3Title: 'Impact Analytics',

      teacherCard3Btn: 'View',

      teacherCard4Title: 'Quiz Reports',

      teacherCard4Btn: 'View',

      teacherCard5Title: 'Gamification Overview',
      teacherCard5Text: 'See how gamification strengthens participation and progress.',
      teacherCard5Btn: 'View',

      adminCard1Title: 'Institution Classroom Profile',
      adminCard1Text: 'View the overall picture of the school unit or institution.',
      adminCard1Btn: 'Open',

      adminCard2Title: 'Impact Analytics',
      adminCard2Text: 'Monitor the effectiveness of interventions and changes.',
      adminCard2Btn: 'View',

      adminCard3Title: 'Gamification Analytics',
      adminCard3Text: 'Overview of participation, badges, levels, and total activation.',
      adminCard3Btn: 'Open',

      adminCard4Title: 'Assessment Overview',
      adminCard4Text: 'See the overall picture of quiz and assessment results.',
      adminCard4Btn: 'View',

      adminCard5Title: 'About EduMorph',
      adminCard5Text: 'Explore the platform’s vision, mission, and operating model.',
      adminCard5Btn: 'View'
    }
  };

  function logout() {
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  function getCurrentLanguage() {
    return localStorage.getItem('edumorphLanguage') || 'el';
  }

  function t(key) {
    const lang = getCurrentLanguage();
    const dict = window.pageTranslations[lang] || window.pageTranslations.el;
    return dict[key] || key;
  }

  function formatRole(role) {
    if (role === 'student') return t('roleStudent');
    if (role === 'teacher') return t('roleTeacher');
    if (role === 'admin') return t('roleAdmin');
    return t('roleUser');
  }

  function createCard(title, text, link, linkText) {
    return `
      <div class="feature-card">
        <h3>${title}</h3>
        <p>${text}</p>
        <a href="${link}" aria-label="${title}">${linkText}</a>
      </div>
    `;
  }

  function buildCardsForRole(role) {
    let description = '';
    let quickInfo = '';
    let cards = '';

    if (role === 'student') {
      description = t('studentDescription');
      quickInfo = t('studentQuickInfo');

      cards += createCard(
        t('studentCard1Title'),
        t('studentCard1Text'),
        'issue-cards.html',
        t('studentCard1Btn')
      );

      cards += createCard(
        t('studentCard2Title'),
        t('studentCard2Text'),
        'classroom-profile.html',
        t('studentCard2Btn')
      );

      cards += createCard(
        t('studentCard3Title'),
        t('studentCard3Text'),
        'quiz.html',
        t('studentCard3Btn')
      );

      cards += createCard(
        t('studentCard4Title'),
        t('studentCard4Text'),
        'gamification.html',
        t('studentCard4Btn')
      );
    } else if (role === 'teacher') {
      description = t('teacherDescription');
      quickInfo = t('teacherQuickInfo');

      cards += createCard(
        t('teacherCard1Title'),
        t('teacherCard1Text'),
        'classroom-profile.html',
        t('teacherCard1Btn')
      );

      cards += createCard(
        t('teacherCard2Title'),
        t('teacherCard2Text'),
        'interventions.html',
        t('teacherCard2Btn')
      );

      cards += createCard(
        t('teacherCard3Title'),
        t('teacherCard3Text'),
        'impact-analytics.html',
        t('teacherCard3Btn')
      );

      cards += createCard(
        t('teacherCard4Title'),
        t('teacherCard4Text'),
        'quiz.html',
        t('teacherCard4Btn')
      );

      cards += createCard(
        t('teacherCard5Title'),
        t('teacherCard5Text'),
        'gamification.html',
        t('teacherCard5Btn')
      );
    } else {
      description = t('adminDescription');
      quickInfo = t('adminQuickInfo');

      cards += createCard(
        t('adminCard1Title'),
        t('adminCard1Text'),
        'classroom-profile.html',
        t('adminCard1Btn')
      );

      cards += createCard(
        t('adminCard2Title'),
        t('adminCard2Text'),
        'impact-analytics.html',
        t('adminCard2Btn')
      );

      cards += createCard(
        t('adminCard3Title'),
        t('adminCard3Text'),
        'gamification.html',
        t('adminCard3Btn')
      );

      cards += createCard(
        t('adminCard4Title'),
        t('adminCard4Text'),
        'quiz.html',
        t('adminCard4Btn')
      );

      cards += createCard(
        t('adminCard5Title'),
        t('adminCard5Text'),
        'about-edumorph.html',
        t('adminCard5Btn')
      );
    }

    return { description, quickInfo, cards };
  }

  function loadDashboard() {
    const userData = localStorage.getItem('user');

    if (!userData) {
      window.location.href = 'login.html';
      return;
    }

    const user = JSON.parse(userData);
    const displayName = user.fullName || user.username || t('fallbackUser');

    document.getElementById('welcomeTitle').textContent = `${t('welcomePrefix')} ${displayName}!`;
    document.getElementById('roleBadge').textContent = formatRole(user.role);

    const roleData = buildCardsForRole(user.role);
    document.getElementById('welcomeText').textContent = roleData.description;
    document.getElementById('quickInfo').textContent = roleData.quickInfo;
    document.getElementById('roleFeatures').innerHTML = roleData.cards;
  }

  function makeCardsAccessible() {
    document.querySelectorAll('.feature-card').forEach(card => {
      card.setAttribute('tabindex', '0');
      card.addEventListener('keydown', function (e) {
        const link = card.querySelector('a');
        if (link && (e.key === 'Enter' || e.key === ' ')) {
          e.preventDefault();
          link.click();
        }
      });
    });
  }

  window.onload = () => {
    loadDashboard();
    setTimeout(() => {
      makeCardsAccessible();
      if (window.EduMorphUI && window.EduMorphUI.applyTranslations) {
        window.EduMorphUI.applyTranslations();
      }
    }, 0);
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Σύνδεση | EduMorph</title>

  <link rel="stylesheet" href="global-accessibility.css">
  <script src="global.js" defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #0f766e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .form-box {
      background: white;
      padding: 36px;
      border-radius: 18px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 1.9rem;
    }

    p {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .field-group {
      text-align: left;
      margin-top: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #1f2937;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 0;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
      background: #fff;
      color: #1f2937;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0ea5a4;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 18px;
    }

    button:hover {
      background: #0f766e;
    }

    a {
      color: #1e3a8a;
      text-decoration: none;
      font-weight: bold;
    }

    .top-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
      font-size: 0.95rem;
    }

    @media (max-width: 520px) {
      .form-box {
        padding: 24px 18px;
      }

      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
<main id="main-content">
  <div class="form-box" role="form" aria-labelledby="login-title">
    <h1 id="login-title" data-i18n="loginTitle">Σύνδεση στην EduMorph</h1>
    <p data-i18n="loginSubtitle">Συνδέσου για να δεις το περιβάλλον του ρόλου σου.</p>

    <div class="field-group">
      <label for="username" data-i18n="usernameLabel">Όνομα χρήστη ή email</label>
      <input
        type="text"
        id="username"
        placeholder="Όνομα χρήστη ή email"
        data-i18n-placeholder="usernamePlaceholder"
        aria-required="true"
      >
    </div>

    <div class="field-group">
      <label for="password" data-i18n="passwordLabel">Κωδικός</label>
      <input
        type="password"
        id="password"
        placeholder="Κωδικός"
        data-i18n-placeholder="passwordPlaceholder"
        aria-required="true"
      >
    </div>

    <button onclick="login()" data-i18n="loginBtn" data-i18n-aria-label="loginBtnAria" aria-label="Σύνδεση">
      Σύνδεση
    </button>

    <div class="top-links">
      <span data-i18n="noAccount">Δεν έχεις λογαριασμό;</span>
      <a href="register.html" data-i18n="registerLink">Εγγραφή</a>
    </div>
  </div>
</main>

<script>
  window.pageTranslations = {
    el: {
      loginTitle: 'Σύνδεση στην EduMorph',
      loginSubtitle: 'Συνδέσου για να δεις το περιβάλλον του ρόλου σου.',
      usernameLabel: 'Όνομα χρήστη ή email',
      usernamePlaceholder: 'Όνομα χρήστη ή email',
      passwordLabel: 'Κωδικός',
      passwordPlaceholder: 'Κωδικός',
      loginBtn: 'Σύνδεση',
      loginBtnAria: 'Σύνδεση',
      noAccount: 'Δεν έχεις λογαριασμό;',
      registerLink: 'Εγγραφή',
      fillAllFields: 'Παρακαλώ συμπλήρωσε όλα τα πεδία.',
      wrongCredentials: 'Λάθος στοιχεία σύνδεσης.'
    },
    en: {
      loginTitle: 'Login to EduMorph',
      loginSubtitle: 'Sign in to access your role-based environment.',
      usernameLabel: 'Username or email',
      usernamePlaceholder: 'Username or email',
      passwordLabel: 'Password',
      passwordPlaceholder: 'Password',
      loginBtn: 'Login',
      loginBtnAria: 'Login',
      noAccount: 'Do not have an account?',
      registerLink: 'Register',
      fillAllFields: 'Please fill in all fields.',
      wrongCredentials: 'Wrong login credentials.'
    }
  };

  function t(key) {
    const lang = localStorage.getItem('edumorphLanguage') || 'el';
    const dict = window.pageTranslations[lang] || window.pageTranslations.el;
    return dict[key] || key;
  }

  function login() {
    const usernameInput = document.getElementById('username').value.trim();
    const passwordInput = document.getElementById('password').value.trim();

    if (!usernameInput || !passwordInput) {
      alert(t('fillAllFields'));
      return;
    }

    const users = JSON.parse(localStorage.getItem('edumorphUsers') || '[]');

    const foundUser = users.find(user =>
      (user.username === usernameInput || user.email === usernameInput) &&
      user.password === passwordInput
    );

    if (!foundUser) {
      alert(t('wrongCredentials'));
      return;
    }

    localStorage.setItem('user', JSON.stringify(foundUser));
    window.location.href = 'dashboard.html';
  }

  window.onload = () => {
    if (window.EduMorphUI && window.EduMorphUI.applyTranslations) {
      window.EduMorphUI.applyTranslations();
    }
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Σύνδεση | EduMorph</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #0f766e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .form-box {
      background: white;
      padding: 35px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }
    h2 { margin-top: 0; color: #1e3a8a; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0ea5a4;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #0f766e; }
    a { color: #1e3a8a; text-decoration: none; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Σύνδεση</h2>
    <input type="text" id="username" placeholder="Όνομα χρήστη">
    <input type="password" id="password" placeholder="Κωδικός">
    <button onclick="login()">Σύνδεση</button>
    <p>Δεν έχεις λογαριασμό; <a href="register.html">Κάνε εγγραφή</a></p>
  </div>

  <script>
    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('Παρακαλώ συμπλήρωσε όλα τα πεδία.');
        return;
      }

      localStorage.setItem('user', username);
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

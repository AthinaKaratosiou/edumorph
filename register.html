<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Εγγραφή | EduMorph</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f766e, #1e3a8a);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .form-box {
      background: white;
      padding: 36px;
      border-radius: 18px;
      width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      color: #1e3a8a;
    }

    p {
      color: #4b5563;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0ea5a4;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #0f766e;
    }

    a {
      color: #1e3a8a;
      text-decoration: none;
      font-weight: bold;
    }

    .hint {
      text-align: left;
      background: #eff6ff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 14px;
      font-size: 0.92rem;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Εγγραφή στην EduMorph</h2>
    <p>Δημιούργησε λογαριασμό και επίλεξε τον ρόλο σου.</p>

    <input type="text" id="fullName" placeholder="Ονοματεπώνυμο">
    <input type="text" id="username" placeholder="Όνομα χρήστη">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Κωδικός">

    <select id="role">
      <option value="">Επίλεξε ρόλο</option>
      <option value="student">Μαθητής</option>
      <option value="teacher">Εκπαιδευτικός</option>
      <option value="admin">Διοίκηση</option>
    </select>

    <button onclick="register()">Ολοκλήρωση εγγραφής</button>

    <div class="hint">
      Κάθε ρόλος οδηγεί σε διαφορετικές λειτουργίες της πλατφόρμας.
    </div>

    <p>Έχεις ήδη λογαριασμό; <a href="login.html">Σύνδεση</a></p>
  </div>

  <script>
    function register() {
      const fullName = document.getElementById('fullName').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const role = document.getElementById('role').value;

      if (!fullName || !username || !email || !password || !role) {
        alert('Παρακαλώ συμπλήρωσε όλα τα πεδία.');
        return;
      }

      const users = JSON.parse(localStorage.getItem('edumorphUsers') || '[]');

      const exists = users.some(
        user => user.username === username || user.email === email
      );

      if (exists) {
        alert('Υπάρχει ήδη χρήστης με αυτό το username ή email.');
        return;
      }

      const newUser = {
        fullName,
        username,
        email,
        password,
        role
      };

      users.push(newUser);
      localStorage.setItem('edumorphUsers', JSON.stringify(users));

      alert('Η εγγραφή ολοκληρώθηκε επιτυχώς!');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
